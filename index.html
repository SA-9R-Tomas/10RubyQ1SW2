<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title> Ramen - Menu</title>
    <style>
        body {
            background-image: url(https://png.pngtree.com/background/20210710/original/pngtree-restaurant-menu-background-material-picture-image_1052797.jpg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding-bottom: 50px;
        }
        .header {
            background-image: url(https://img.freepik.com/premium-vector/hand-drawn-ramen-background_23-2151856750.jpg);
            color: white;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 12px rgba(12,8,6,7.1);
        }
        .menu-card {
            background-color: #fff8e;  
            border-radius: 15px;
            box-shadow: 0 6px 18px rgba(11,5,2.1);
            overflow: hidden;
        }
        .table th {
            background-image: url(https://png.pngtree.com/background/20210710/original/pngtree-restaurant-menu-background-material-picture-image_1052797.jpg);
            color: white;
            font-size: 1.1rem;
            padding: 12px !important;
            text-align: center;
        }
        .table td {
            padding: 12px !important;
        }
        .price {
            font-weight: bold;
            color: #2c3e50;
        }
        .opening-hours {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
            font-style: italic;
        }
        .restaurant-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: orange;
        }


    </style>
</head>
<body>
    <div class="container">
        <div class="header text-center">
            <i class="fas fa-utensils restaurant-icon"></i>
            <div id="name1" class="display-4 fw-bold" style="color: black;">Ichiraku Ramen</div>
        
            <div id="owner" class="fs-5 mt-2">Owned by: Nicolle Tomas</div>
           <div id="since" class="fs-6"></div>
        </div>
        
        <div class="menu-card">
            <table class="table table-hover text-center">
                <thead>
                    <tr>
                        <th id="heading1" colspan="2">Menu</th>
                    </tr>
                    <tr>
                        <th>Product Name</th>
                        <th>Price (₱)</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td id="prod1">Tonkotsu</td>
                        <td id="price1" class="price">130</td>
                    </tr>
                    <tr>
                        <td id="prod2">Miso Ramen</td>
                        <td id="price2" class="price">300</td>
                    </tr>
                    <tr>
                        <td id="prod3">Udon</td>
                        <td id="price3" class="price">150</td>
                    </tr>
                    <tr>
                        <td id="prod4">Okinawa Soba</td>
                        <td id="price4" class="price">150</td>
                    </tr>
                    <tr>
                        <td id="prod5">Sapporo Ramen</td>
                        <td id="price5" class="price">180</td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <div class="opening-hours">
            <i class="fas fa-clock me-2"></i>
            <span id="openingHours">Open daily: 8 AM – 11 PM</span>
        </div>
        
        <div class="text-center mt-4">
            <span id="orderType" class="badge bg-primary">Dine-in & Takeout</span>
        </div>
    </div>
    
    <script type="py" src="main.py"></script>
</body>
</html>
